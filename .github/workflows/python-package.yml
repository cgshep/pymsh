# Install Python dependencies, run tests, and lint across supported versions.
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python checking

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Install package and dev dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8
        python -m pip install -e ".[test]"

    - name: Lint with flake8
      run: |
        # Stop the build on Python syntax errors or undefined names.
        flake8 pymsh.py tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # Style hints; never fail the build.
        flake8 pymsh.py tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Type check with mypy
      run: |
        python -m mypy pymsh.py

    - name: Test with pytest (with coverage)
      run: |
        python -m pytest --cov=pymsh --cov-report=term-missing --cov-report=xml

    - name: Upload coverage artifact
      if: matrix.python-version == '3.12'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-xml
        path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Build sdist and wheel
      run: |
        python -m pip install --upgrade pip build
        python -m build
    - name: Check distributions
      run: |
        python -m pip install twine
        python -m twine check dist/*
    - name: Upload distribution artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
